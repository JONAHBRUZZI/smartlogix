name: Deploy Orders Service to ECS

on:
  push:
    branches: ["main"]
    paths:
      - "orders-service/**"
      - "event-contracts/**"
      - ".github/workflows/deploy-orders-ecs.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: orders-service
  ECS_CLUSTER: smartlogix-cluster
  ECS_SERVICE: orders-service
  ECS_TASK_DEFINITION: orders-service-task
  CONTAINER_NAME: orders-service

jobs:
  no-oidc-permission:
    if: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: OIDC role missing in this environment
        run: |
          echo "AWS_GITHUB_ACTIONS_ROLE_ARN no esta configurado."
          echo "En laboratorios con IAM restringido, usa el flujo manual:"
          echo "1) .\\push-ecr-compose.ps1 -Region us-east-1 -ImageTag latest"
          echo "2) Despliegue ECS desde consola o AWS CLI con el rol del lab"

  deploy:
    if: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_GITHUB_ACTIONS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f ./orders-service/Dockerfile -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEFINITION \
            --query taskDefinition > task-definition.json

      - name: Render task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ env.CONTAINER_NAME }}
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy ECS task definition
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
