services:
  # Base de datos para microservicios
  postgres-db:
    image: postgres:15
    container_name: smartlogix-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Este script creara las DBs automaticamente al iniciar
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  # LocalStack para SQS, SNS, CloudWatch, Logs y KMS
  localstack:
    image: ${LOCALSTACK_IMAGE:-localstack/localstack:3.8}
    container_name: smartlogix-localstack
    ports:
      - "${LOCALSTACK_PORT:-4567}:4566"
    environment:
      - LOCALSTACK_AUTH_TOKEN=${LOCALSTACK_AUTH_TOKEN-}
      - SERVICES=${LOCALSTACK_SERVICES:-cloudformation,ecs,lambda,iam,ec2,elbv2,rds,sqs,sns,logs,cloudwatch,kms,secretsmanager,s3}
      - DEFAULT_REGION=us-east-1
      - ENABLE_LOCALSTACK_ROUTE53=${ENABLE_LOCALSTACK_ROUTE53:-false}
      - ENABLE_LOCALSTACK_COGNITO=${ENABLE_LOCALSTACK_COGNITO:-false}
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - ./init-sqs.sh:/etc/localstack/init/ready.d
      - ../Frontend/dist:/workspace/frontend-dist:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "awslocal sqs list-queues >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 20

  orders-service:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: smartlogix-orders
    working_dir: /workspace/orders-service
    command: ["sh", "-c", "chmod +x mvnw ; mvn -q -f /workspace/event-contracts/pom.xml -DskipTests install ; ./mvnw spring-boot:run"]
    volumes:
      - ./:/workspace
    ports:
      - "8081:8081"
    expose:
      - "8081"
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/orders_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - AWS_SQS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - ORDERS_QUEUE=orders-queue
      - SHIPPING_QUEUE=shipping-queue
      - AWS_CLOUDWATCH_ENDPOINT=http://localstack:4566
      - CLOUDWATCH_LOG_GROUP=/smartlogix/orders-service
      - CLOUDWATCH_LOG_STREAM=local
      - SPRING_PROFILES_ACTIVE=local-cloudwatch
    depends_on:
      postgres-db:
        condition: service_healthy
      localstack:
        condition: service_healthy

  inventory-service:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: smartlogix-inventory
    working_dir: /workspace/inventory-service
    command: ["sh", "-c", "chmod +x mvnw ; mvn -q -f /workspace/event-contracts/pom.xml -DskipTests install ; ./mvnw spring-boot:run"]
    volumes:
      - ./:/workspace
    ports:
      - "8082:8082"
    expose:
      - "8082"
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/inventory_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - AWS_SQS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SHIPPING_QUEUE=shipping-queue
      - AWS_CLOUDWATCH_ENDPOINT=http://localstack:4566
      - CLOUDWATCH_LOG_GROUP=/smartlogix/inventory-service
      - CLOUDWATCH_LOG_STREAM=local
      - SPRING_PROFILES_ACTIVE=local-cloudwatch
    depends_on:
      postgres-db:
        condition: service_healthy
      localstack:
        condition: service_healthy
  shipping-service:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: smartlogix-shipping
    working_dir: /workspace/shipping-service
    command: ["sh", "-c", "chmod +x mvnw ; mvn -q -f /workspace/event-contracts/pom.xml -DskipTests install ; ./mvnw spring-boot:run"]
    volumes:
      - ./:/workspace
    ports:
      - "8084:8084"
    expose:
      - "8084"
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/shipping_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - AWS_SQS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - SHIPPING_QUEUE=shipping-queue
      - NOTIFICATION_TOPIC_ARN=arn:aws:sns:us-east-1:000000000000:notification-events-topic
      - AWS_CLOUDWATCH_ENDPOINT=http://localstack:4566
      - CLOUDWATCH_LOG_GROUP=/smartlogix/shipping-service
      - CLOUDWATCH_LOG_STREAM=local
      - SPRING_PROFILES_ACTIVE=local-cloudwatch
    depends_on:
      postgres-db:
        condition: service_healthy
      localstack:
        condition: service_healthy

  notification-service:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: smartlogix-notification
    working_dir: /workspace/notification-service
    command: ["sh", "-c", "chmod +x mvnw ; mvn -q -f /workspace/event-contracts/pom.xml -DskipTests install ; ./mvnw spring-boot:run"]
    volumes:
      - ./:/workspace
    ports:
      - "8085:8085"
    expose:
      - "8085"
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/notification_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - AWS_SQS_ENDPOINT=http://localstack:4566
      - AWS_REGION=us-east-1
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
      - NOTIFICATION_EVENTS_QUEUE=notification-events-queue
      - AWS_CLOUDWATCH_ENDPOINT=http://localstack:4566
      - CLOUDWATCH_LOG_GROUP=/smartlogix/notification-service
      - CLOUDWATCH_LOG_STREAM=local
      - SPRING_PROFILES_ACTIVE=local-cloudwatch
    depends_on:
      postgres-db:
        condition: service_healthy
      localstack:
        condition: service_healthy

  api-gateway:
    image: nginx:1.27-alpine
    container_name: smartlogix-api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - orders-service
      - inventory-service
      - shipping-service
      - notification-service

volumes:
  postgres_data:
