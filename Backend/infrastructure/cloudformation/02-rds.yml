AWSTemplateFormatVersion: '2010-09-09'
Description: SmartLogix low-cost RDS PostgreSQL stack (single instance, student budget).

Parameters:
  ProjectName:
    Type: String
    Default: smartlogix
  PrivateSubnet1Id:
    Type: AWS::EC2::Subnet::Id
  PrivateSubnet2Id:
    Type: AWS::EC2::Subnet::Id
  RdsSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  DbMasterUsername:
    Type: String
    Default: smartlogix_admin
    MinLength: 4
    MaxLength: 32
  DbMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
  DbInstanceClass:
    Type: String
    Default: db.t3.micro
    AllowedValues:
      - db.t3.micro
      - db.t4g.micro
  AllocatedStorage:
    Type: Number
    Default: 20
    MinValue: 20
    MaxValue: 100

Resources:
  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: Subnet group for SmartLogix RDS
      DBSubnetGroupName: !Sub ${ProjectName}-db-subnet-group
      SubnetIds:
        - !Ref PrivateSubnet1Id
        - !Ref PrivateSubnet2Id

  SmartLogixDb:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub ${ProjectName}-postgres
      Engine: postgres
      EngineVersion: '15.7'
      DBInstanceClass: !Ref DbInstanceClass
      AllocatedStorage: !Ref AllocatedStorage
      StorageType: gp3
      StorageEncrypted: true
      MasterUsername: !Ref DbMasterUsername
      MasterUserPassword: !Ref DbMasterPassword
      PubliclyAccessible: false
      MultiAZ: false
      BackupRetentionPeriod: 1
      DeletionProtection: false
      AutoMinorVersionUpgrade: true
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSecurityGroupId
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-postgres

  AppDbSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub ${ProjectName}/rds/app
      Description: JDBC connection payload for SmartLogix apps
      SecretString: !Sub |
        {
          "username":"${DbMasterUsername}",
          "password":"${DbMasterPassword}",
          "host":"${SmartLogixDb.Endpoint.Address}",
          "port":"${SmartLogixDb.Endpoint.Port}",
          "orders_db":"orders_db",
          "inventory_db":"inventory_db",
          "shipping_db":"shipping_db",
          "notification_db":"notification_db"
        }

Outputs:
  DbEndpoint:
    Value: !GetAtt SmartLogixDb.Endpoint.Address
    Export:
      Name: !Sub ${AWS::StackName}-DbEndpoint

  DbPort:
    Value: !GetAtt SmartLogixDb.Endpoint.Port
    Export:
      Name: !Sub ${AWS::StackName}-DbPort

  DbSecretArn:
    Value: !Ref AppDbSecret
    Export:
      Name: !Sub ${AWS::StackName}-DbSecretArn
