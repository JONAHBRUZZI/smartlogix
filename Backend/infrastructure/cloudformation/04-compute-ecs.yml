AWSTemplateFormatVersion: '2010-09-09'
Description: SmartLogix low-cost ECS Fargate compute stack (4 services, path-based routing).

Parameters:
  ProjectName:
    Type: String
    Default: smartlogix
  VpcId:
    Type: AWS::EC2::VPC::Id
  PublicSubnet1Id:
    Type: AWS::EC2::Subnet::Id
  PublicSubnet2Id:
    Type: AWS::EC2::Subnet::Id
  AlbSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  ServiceSecurityGroupId:
    Type: AWS::EC2::SecurityGroup::Id
  DbEndpoint:
    Type: String
  DbPort:
    Type: Number
    Default: 5432
  DbSecretArn:
    Type: String
  OrdersTaskRoleArn:
    Type: String
  InventoryTaskRoleArn:
    Type: String
  ShippingTaskRoleArn:
    Type: String
  NotificationTaskRoleArn:
    Type: String
  OrdersQueueName:
    Type: String
  ShippingQueueName:
    Type: String
  NotificationEventsQueueName:
    Type: String
  NotificationTopicArn:
    Type: String
  OrdersImageUri:
    Type: String
    Description: ECR image URI for orders-service
  InventoryImageUri:
    Type: String
    Description: ECR image URI for inventory-service
  ShippingImageUri:
    Type: String
    Description: ECR image URI for shipping-service
  NotificationImageUri:
    Type: String
    Description: ECR image URI for notification-service
  OrdersDesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
  InventoryDesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
  ShippingDesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
  NotificationDesiredCount:
    Type: Number
    Default: 1
    MinValue: 0
  LogRetentionDays:
    Type: Number
    Default: 3
    AllowedValues:
      - 1
      - 3
      - 7
      - 14

Resources:
  Cluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub ${ProjectName}-cluster

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-ecs-exec-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: ecs-secrets-read
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Ref DbSecretArn

  OrdersLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /smartlogix/orders-service
      RetentionInDays: !Ref LogRetentionDays

  InventoryLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /smartlogix/inventory-service
      RetentionInDays: !Ref LogRetentionDays

  ShippingLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /smartlogix/shipping-service
      RetentionInDays: !Ref LogRetentionDays

  NotificationLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /smartlogix/notification-service
      RetentionInDays: !Ref LogRetentionDays

  DbBootstrapLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /smartlogix/db-bootstrap
      RetentionInDays: !Ref LogRetentionDays

  DbBootstrapTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-db-bootstrap-task
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: db-bootstrap
          Image: postgres:15-alpine
          Essential: true
          Environment:
            - Name: DB_HOST
              Value: !Ref DbEndpoint
            - Name: DB_PORT
              Value: !Sub '${DbPort}'
            - Name: DB_NAMES
              Value: orders_db inventory_db shipping_db notification_db
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub '${DbSecretArn}:username::'
            - Name: DB_PASSWORD
              ValueFrom: !Sub '${DbSecretArn}:password::'
          Command:
            - sh
            - -ec
            - |
              export PGPASSWORD="$DB_PASSWORD"
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres; do
                sleep 2
              done

              for db in $DB_NAMES; do
                exists=$(psql -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='${db}'")
                if [ "$exists" != "1" ]; then
                  psql -v ON_ERROR_STOP=1 -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d postgres -c "CREATE DATABASE \"${db}\""
                fi
              done
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref DbBootstrapLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  DbBootstrapLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-db-bootstrap-cr-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: db-bootstrap-cr-policy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - ecs:RunTask
                  - ecs:DescribeTasks
                Resource: '*'
              - Effect: Allow
                Action:
                  - ecs:DescribeClusters
                Resource: !GetAtt Cluster.Arn
              - Effect: Allow
                Action:
                  - iam:PassRole
                Resource: !GetAtt TaskExecutionRole.Arn
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  DbBootstrapLambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub ${ProjectName}-db-bootstrap-cr
      Runtime: python3.12
      Handler: index.handler
      Timeout: 900
      Role: !GetAtt DbBootstrapLambdaRole.Arn
      Code:
        ZipFile: |
          import json
          import time
          import traceback
          import urllib.request

          import boto3


          def send(event, context, status, data, physical_id=None, reason=None):
              body = {
                  "Status": status,
                  "Reason": reason or f"See CloudWatch Logs: {context.log_stream_name}",
                  "PhysicalResourceId": physical_id or event.get("PhysicalResourceId") or "DbBootstrapCustomResource",
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data,
              }
              req = urllib.request.Request(
                  event["ResponseURL"],
                  method="PUT",
                  data=json.dumps(body).encode("utf-8"),
                  headers={"content-type": ""},
              )
              with urllib.request.urlopen(req):
                  pass


          def handler(event, context):
              try:
                  request_type = event["RequestType"]
                  props = event["ResourceProperties"]

                  if request_type == "Delete":
                      send(event, context, "SUCCESS", {"Message": "Delete skipped"})
                      return

                  ecs = boto3.client("ecs")
                  run = ecs.run_task(
                      cluster=props["ClusterArn"],
                      taskDefinition=props["TaskDefinitionArn"],
                      launchType="FARGATE",
                      networkConfiguration={
                          "awsvpcConfiguration": {
                              "subnets": props["Subnets"],
                              "securityGroups": [props["SecurityGroupId"]],
                              "assignPublicIp": "ENABLED",
                          }
                      },
                      count=1,
                  )

                  failures = run.get("failures", [])
                  if failures:
                      raise RuntimeError(f"run_task failures: {failures}")

                  task_arn = run["tasks"][0]["taskArn"]

                  deadline = time.time() + 840
                  last_status = "UNKNOWN"
                  exit_code = None

                  while time.time() < deadline:
                      desc = ecs.describe_tasks(cluster=props["ClusterArn"], tasks=[task_arn])
                      tasks = desc.get("tasks", [])
                      if not tasks:
                          raise RuntimeError("Bootstrap task not found after run_task")

                      task = tasks[0]
                      last_status = task.get("lastStatus", "UNKNOWN")
                      containers = task.get("containers", [])
                      if containers:
                          exit_code = containers[0].get("exitCode")

                      if last_status == "STOPPED":
                          break

                      time.sleep(5)

                  if last_status != "STOPPED":
                      raise TimeoutError("Timed out waiting for bootstrap task to finish")

                  if exit_code != 0:
                      reason = desc["tasks"][0].get("stoppedReason", "Unknown failure")
                      raise RuntimeError(f"Bootstrap task failed. exit_code={exit_code}, reason={reason}")

                  send(
                      event,
                      context,
                      "SUCCESS",
                      {"TaskArn": task_arn, "ExitCode": str(exit_code)},
                      physical_id="DbBootstrapCustomResource",
                  )
              except Exception as exc:
                  traceback.print_exc()
                  send(
                      event,
                      context,
                      "FAILED",
                      {"Error": str(exc)},
                      physical_id="DbBootstrapCustomResource",
                      reason=str(exc),
                  )

  DbBootstrapCustomResource:
    Type: Custom::DbBootstrap
    DependsOn:
      - Cluster
      - DbBootstrapTaskDefinition
      - DbBootstrapLambda
    Properties:
      ServiceToken: !GetAtt DbBootstrapLambda.Arn
      ClusterArn: !GetAtt Cluster.Arn
      TaskDefinitionArn: !Ref DbBootstrapTaskDefinition
      SecurityGroupId: !Ref ServiceSecurityGroupId
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id

  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-alb
      Type: application
      Scheme: internet-facing
      SecurityGroups:
        - !Ref AlbSecurityGroupId
      Subnets:
        - !Ref PublicSubnet1Id
        - !Ref PublicSubnet2Id

  HttpListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '404'
            ContentType: application/json
            MessageBody: '{"message":"Route not found"}'

  OrdersTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-tg-orders
      VpcId: !Ref VpcId
      Port: 8081
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /actuator/health
      Matcher:
        HttpCode: 200-399

  InventoryTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-tg-inventory
      VpcId: !Ref VpcId
      Port: 8082
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /actuator/health
      Matcher:
        HttpCode: 200-399

  ShippingTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-tg-shipping
      VpcId: !Ref VpcId
      Port: 8084
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /actuator/health
      Matcher:
        HttpCode: 200-399

  NotificationTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-tg-notification
      VpcId: !Ref VpcId
      Port: 8085
      Protocol: HTTP
      TargetType: ip
      HealthCheckPath: /actuator/health
      Matcher:
        HttpCode: 200-399

  OrdersRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/orders*
              - /actuator/orders*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref OrdersTargetGroup

  InventoryRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 20
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/inventory*
              - /actuator/inventory*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref InventoryTargetGroup

  ShippingRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 30
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/shipments*
              - /actuator/shipments*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref ShippingTargetGroup

  NotificationRule:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref HttpListener
      Priority: 40
      Conditions:
        - Field: path-pattern
          PathPatternConfig:
            Values:
              - /api/notifications*
              - /actuator/notifications*
      Actions:
        - Type: forward
          TargetGroupArn: !Ref NotificationTargetGroup

  OrdersTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-orders-task
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !Ref OrdersTaskRoleArn
      ContainerDefinitions:
        - Name: orders-service
          Image: !Ref OrdersImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8081
              Protocol: tcp
          Environment:
            - Name: SERVER_PORT
              Value: '8081'
            - Name: DB_URL
              Value: !Sub jdbc:postgresql://${DbEndpoint}:${DbPort}/orders_db
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_SQS_ENDPOINT
              Value: !Sub https://sqs.${AWS::Region}.amazonaws.com
            - Name: ORDERS_QUEUE
              Value: !Ref OrdersQueueName
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub '${DbSecretArn}:username::'
            - Name: DB_PASSWORD
              ValueFrom: !Sub '${DbSecretArn}:password::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OrdersLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  InventoryTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-inventory-task
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !Ref InventoryTaskRoleArn
      ContainerDefinitions:
        - Name: inventory-service
          Image: !Ref InventoryImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8082
              Protocol: tcp
          Environment:
            - Name: SERVER_PORT
              Value: '8082'
            - Name: DB_URL
              Value: !Sub jdbc:postgresql://${DbEndpoint}:${DbPort}/inventory_db
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_SQS_ENDPOINT
              Value: !Sub https://sqs.${AWS::Region}.amazonaws.com
            - Name: SHIPPING_QUEUE
              Value: !Ref ShippingQueueName
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub '${DbSecretArn}:username::'
            - Name: DB_PASSWORD
              ValueFrom: !Sub '${DbSecretArn}:password::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref InventoryLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  ShippingTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-shipping-task
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !Ref ShippingTaskRoleArn
      ContainerDefinitions:
        - Name: shipping-service
          Image: !Ref ShippingImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8084
              Protocol: tcp
          Environment:
            - Name: SERVER_PORT
              Value: '8084'
            - Name: DB_URL
              Value: !Sub jdbc:postgresql://${DbEndpoint}:${DbPort}/shipping_db
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_SQS_ENDPOINT
              Value: !Sub https://sqs.${AWS::Region}.amazonaws.com
            - Name: SHIPPING_QUEUE
              Value: !Ref ShippingQueueName
            - Name: NOTIFICATION_TOPIC_ARN
              Value: !Ref NotificationTopicArn
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub '${DbSecretArn}:username::'
            - Name: DB_PASSWORD
              ValueFrom: !Sub '${DbSecretArn}:password::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ShippingLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  NotificationTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub ${ProjectName}-notification-task
      NetworkMode: awsvpc
      RequiresCompatibilities: [FARGATE]
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      TaskRoleArn: !Ref NotificationTaskRoleArn
      ContainerDefinitions:
        - Name: notification-service
          Image: !Ref NotificationImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 8085
              Protocol: tcp
          Environment:
            - Name: SERVER_PORT
              Value: '8085'
            - Name: DB_URL
              Value: !Sub jdbc:postgresql://${DbEndpoint}:${DbPort}/notification_db
            - Name: AWS_REGION
              Value: !Ref AWS::Region
            - Name: AWS_SQS_ENDPOINT
              Value: !Sub https://sqs.${AWS::Region}.amazonaws.com
            - Name: NOTIFICATION_EVENTS_QUEUE
              Value: !Ref NotificationEventsQueueName
          Secrets:
            - Name: DB_USER
              ValueFrom: !Sub '${DbSecretArn}:username::'
            - Name: DB_PASSWORD
              ValueFrom: !Sub '${DbSecretArn}:password::'
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref NotificationLogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs

  OrdersService:
    Type: AWS::ECS::Service
    DependsOn:
      - OrdersRule
      - DbBootstrapCustomResource
    Properties:
      ServiceName: !Sub ${ProjectName}-orders-svc
      Cluster: !Ref Cluster
      DesiredCount: !Ref OrdersDesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref OrdersTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroupId
          Subnets:
            - !Ref PublicSubnet1Id
            - !Ref PublicSubnet2Id
      LoadBalancers:
        - TargetGroupArn: !Ref OrdersTargetGroup
          ContainerName: orders-service
          ContainerPort: 8081

  InventoryService:
    Type: AWS::ECS::Service
    DependsOn:
      - InventoryRule
      - DbBootstrapCustomResource
    Properties:
      ServiceName: !Sub ${ProjectName}-inventory-svc
      Cluster: !Ref Cluster
      DesiredCount: !Ref InventoryDesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref InventoryTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroupId
          Subnets:
            - !Ref PublicSubnet1Id
            - !Ref PublicSubnet2Id
      LoadBalancers:
        - TargetGroupArn: !Ref InventoryTargetGroup
          ContainerName: inventory-service
          ContainerPort: 8082

  ShippingService:
    Type: AWS::ECS::Service
    DependsOn:
      - ShippingRule
      - DbBootstrapCustomResource
    Properties:
      ServiceName: !Sub ${ProjectName}-shipping-svc
      Cluster: !Ref Cluster
      DesiredCount: !Ref ShippingDesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref ShippingTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroupId
          Subnets:
            - !Ref PublicSubnet1Id
            - !Ref PublicSubnet2Id
      LoadBalancers:
        - TargetGroupArn: !Ref ShippingTargetGroup
          ContainerName: shipping-service
          ContainerPort: 8084

  NotificationService:
    Type: AWS::ECS::Service
    DependsOn:
      - NotificationRule
      - DbBootstrapCustomResource
    Properties:
      ServiceName: !Sub ${ProjectName}-notification-svc
      Cluster: !Ref Cluster
      DesiredCount: !Ref NotificationDesiredCount
      LaunchType: FARGATE
      TaskDefinition: !Ref NotificationTaskDefinition
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !Ref ServiceSecurityGroupId
          Subnets:
            - !Ref PublicSubnet1Id
            - !Ref PublicSubnet2Id
      LoadBalancers:
        - TargetGroupArn: !Ref NotificationTargetGroup
          ContainerName: notification-service
          ContainerPort: 8085

Outputs:
  ClusterName:
    Value: !Ref Cluster
    Export:
      Name: !Sub ${AWS::StackName}-ClusterName

  OrdersServiceName:
    Value: !GetAtt OrdersService.Name
    Export:
      Name: !Sub ${AWS::StackName}-OrdersServiceName

  InventoryServiceName:
    Value: !GetAtt InventoryService.Name
    Export:
      Name: !Sub ${AWS::StackName}-InventoryServiceName

  ShippingServiceName:
    Value: !GetAtt ShippingService.Name
    Export:
      Name: !Sub ${AWS::StackName}-ShippingServiceName

  NotificationServiceName:
    Value: !GetAtt NotificationService.Name
    Export:
      Name: !Sub ${AWS::StackName}-NotificationServiceName

  AlbDnsName:
    Value: !GetAtt Alb.DNSName
    Export:
      Name: !Sub ${AWS::StackName}-AlbDnsName
