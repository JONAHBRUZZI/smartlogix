AWSTemplateFormatVersion: '2010-09-09'
Description: SmartLogix messaging stack with SQS+DLQ, SNS filter policy, and least-privilege ECS task roles.

Parameters:
  ProjectName:
    Type: String
    Default: smartlogix
  QueueVisibilityTimeout:
    Type: Number
    Default: 45
  MessageRetentionSeconds:
    Type: Number
    Default: 345600
  OrdersQueueName:
    Type: String
    Default: orders-queue
  ShippingQueueName:
    Type: String
    Default: shipping-queue
  NotificationEventsQueueName:
    Type: String
    Default: notification-events-queue
  NotificationTopicName:
    Type: String
    Default: notification-events-topic

Resources:
  OrdersDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${OrdersQueueName}-dlq
      MessageRetentionPeriod: !Ref MessageRetentionSeconds
      KmsMasterKeyId: alias/aws/sqs

  OrdersQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref OrdersQueueName
      VisibilityTimeout: !Ref QueueVisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionSeconds
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt OrdersDlq.Arn
        maxReceiveCount: 5

  ShippingDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${ShippingQueueName}-dlq
      MessageRetentionPeriod: !Ref MessageRetentionSeconds
      KmsMasterKeyId: alias/aws/sqs

  ShippingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref ShippingQueueName
      VisibilityTimeout: !Ref QueueVisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionSeconds
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ShippingDlq.Arn
        maxReceiveCount: 5

  NotificationEventsDlq:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub ${NotificationEventsQueueName}-dlq
      MessageRetentionPeriod: !Ref MessageRetentionSeconds
      KmsMasterKeyId: alias/aws/sqs

  NotificationEventsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Ref NotificationEventsQueueName
      VisibilityTimeout: !Ref QueueVisibilityTimeout
      MessageRetentionPeriod: !Ref MessageRetentionSeconds
      KmsMasterKeyId: alias/aws/sqs
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationEventsDlq.Arn
        maxReceiveCount: 5

  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref NotificationTopicName
      KmsMasterKeyId: alias/aws/sns

  NotificationSnsToSqsSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      Protocol: sqs
      Endpoint: !GetAtt NotificationEventsQueue.Arn
      TopicArn: !Ref NotificationTopic
      RawMessageDelivery: true
      FilterPolicy:
        audience:
          - CLIENT
          - OPERATOR
          - BOTH

  NotificationQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref NotificationEventsQueue
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowSnsPublishToNotificationQueue
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt NotificationEventsQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref NotificationTopic

  OrdersTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-orders-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: orders-sqs-publish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueUrl
                  - sqs:GetQueueAttributes
                Resource: !GetAtt OrdersQueue.Arn

  InventoryTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-inventory-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: inventory-sqs-consume-publish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource: !GetAtt OrdersQueue.Arn
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                  - sqs:GetQueueUrl
                  - sqs:GetQueueAttributes
                Resource: !GetAtt ShippingQueue.Arn

  ShippingTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-shipping-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: shipping-sqs-sns
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource: !GetAtt ShippingQueue.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref NotificationTopic

  NotificationTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-notification-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: notification-sqs-consume
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:ChangeMessageVisibility
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource: !GetAtt NotificationEventsQueue.Arn

Outputs:
  OrdersQueueName:
    Value: !GetAtt OrdersQueue.QueueName
    Export:
      Name: !Sub ${AWS::StackName}-OrdersQueueName

  OrdersQueueArn:
    Value: !GetAtt OrdersQueue.Arn
    Export:
      Name: !Sub ${AWS::StackName}-OrdersQueueArn

  ShippingQueueName:
    Value: !GetAtt ShippingQueue.QueueName
    Export:
      Name: !Sub ${AWS::StackName}-ShippingQueueName

  ShippingQueueArn:
    Value: !GetAtt ShippingQueue.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ShippingQueueArn

  NotificationEventsQueueName:
    Value: !GetAtt NotificationEventsQueue.QueueName
    Export:
      Name: !Sub ${AWS::StackName}-NotificationEventsQueueName

  NotificationEventsQueueArn:
    Value: !GetAtt NotificationEventsQueue.Arn
    Export:
      Name: !Sub ${AWS::StackName}-NotificationEventsQueueArn

  NotificationTopicArn:
    Value: !Ref NotificationTopic
    Export:
      Name: !Sub ${AWS::StackName}-NotificationTopicArn

  OrdersTaskRoleArn:
    Value: !GetAtt OrdersTaskRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-OrdersTaskRoleArn

  InventoryTaskRoleArn:
    Value: !GetAtt InventoryTaskRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-InventoryTaskRoleArn

  ShippingTaskRoleArn:
    Value: !GetAtt ShippingTaskRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-ShippingTaskRoleArn

  NotificationTaskRoleArn:
    Value: !GetAtt NotificationTaskRole.Arn
    Export:
      Name: !Sub ${AWS::StackName}-NotificationTaskRoleArn
