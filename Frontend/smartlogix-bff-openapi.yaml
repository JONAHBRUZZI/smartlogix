openapi: 3.0.3
info:
  title: SmartLogix Core Microservices API
  version: 1.0.0
  description: API contract for the current SmartLogix core without marketplace integration.
servers:
  - url: http://localhost:8080
    description: Local reverse proxy

tags:
  - name: Orders
  - name: Inventory
  - name: Shipping
  - name: Notifications

paths:
  /api/orders:
    get:
      tags: [Orders]
      summary: List orders
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      tags: [Orders]
      summary: Create order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateOrderResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/inventory:
    get:
      tags: [Inventory]
      summary: List inventory records
      responses:
        "200":
          description: Inventory list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Inventory"

  /api/inventory/{sku}:
    get:
      tags: [Inventory]
      summary: Get inventory by SKU
      parameters:
        - name: sku
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inventory"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/shipments:
    get:
      tags: [Shipping]
      summary: List shipments
      responses:
        "200":
          description: Shipments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Shipment"

  /api/shipments/{orderId}:
    get:
      tags: [Shipping]
      summary: Get shipment by order id
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Shipment data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Shipment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/notifications/order/{orderId}:
    get:
      tags: [Notifications]
      summary: Notifications by order
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NotificationRecord"

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    Order:
      type: object
      properties:
        id:
          type: integer
          format: int64
        customerId:
          type: string
        sku:
          type: string
        quantity:
          type: integer
        status:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true

    CreateOrderRequest:
      type: object
      properties:
        customerId:
          type: string
        sku:
          type: string
        quantity:
          type: integer
      required: [customerId, sku, quantity]

    CreateOrderResponse:
      type: object
      properties:
        orderId:
          type: string
        status:
          type: string
        message:
          type: string

    Inventory:
      type: object
      properties:
        id:
          type: integer
          format: int64
        sku:
          type: string
        stock:
          type: integer

    Shipment:
      type: object
      properties:
        id:
          type: integer
          format: int64
        orderId:
          type: string
        customerId:
          type: string
        sku:
          type: string
        quantity:
          type: integer
        status:
          type: string
        trackingNumber:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
          nullable: true
        shippedAt:
          type: string
          format: date-time
          nullable: true

    NotificationRecord:
      type: object
      properties:
        id:
          type: integer
          format: int64
        eventId:
          type: string
        orderId:
          type: string
        customerId:
          type: string
        stage:
          type: string
        status:
          type: string
        message:
          type: string
        targetAudience:
          type: string
        sourceService:
          type: string
        occurredAt:
          type: string
          format: date-time
        receivedAt:
          type: string
          format: date-time
