services:
  api-gateway:
    image: nginx:alpine
    container_name: smartlogix-api-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./Backend/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - orders-service
      - inventory-service
      - shipping-service
      - notification-service
    deploy:
      resources:
        limits:
          memory: 128M

  postgres-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  inventory-service:
    image: jonahbruzzi/inventory-service:latest
    container_name: smartlogix-inventory
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/inventory_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - JAVA_TOOL_OPTIONS=-Xmx96m
    depends_on:
      postgres-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  shipping-service:
    image: jonahbruzzi/shipping-service:latest
    container_name: smartlogix-shipping
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/shipping_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - JAVA_TOOL_OPTIONS=-Xmx96m
    depends_on:
      postgres-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

  notification-service:
    image: jonahbruzzi/notification-service:latest
    container_name: smartlogix-notification
    restart: unless-stopped
    environment:
      - DB_URL=jdbc:postgresql://postgres-db:5432/notification_db
      - DB_USER=postgres
      - DB_PASSWORD=admin123
      - JAVA_TOOL_OPTIONS=-Xmx96m
    depends_on:
      postgres-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  postgres_data:
